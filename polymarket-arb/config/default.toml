[trading]
polymarket_fee = 0.07
slippage_est = 0.005
min_edge = 0.015
min_notional = 1.0
kelly_fraction_multiplier = 0.25
# Capital basis for Kelly sizing. Options:
#   "available_cash" — starting_capital + realized_pnl - position_cost (conservative, no compounding)
#   "total_equity"   — starting_capital + realized_pnl + unrealized_pnl (compounds gains into sizing)
capital_source = "available_cash"

[network]
websocket_reconnect_min_backoff = 1.0
websocket_reconnect_max_backoff = 60.0
stale_feed_threshold_ms = 60000
stale_silence_window_s = 30.0

[execution]
order_timeout_s = 30.0
opportunity_dedup_window_s = 60.0

[paper_trading]
mean_latency_ms = 120.0
std_latency_ms = 30.0

[risk]
max_daily_drawdown = 20.0
max_exposure_per_asset = 5.0
max_portfolio_exposure = 20.0

[monitoring]
health_port = 8080
